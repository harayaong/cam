<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이미지 템플릿</title>
  <style>
    :root {
      --accent: #f97316; --accent2: #ea580c;
      --border: #e0d8d0; --text-muted: #7a6a58;
      --panel-label: #fff4ed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI','Noto Sans KR',sans-serif;
      background: #f0f0f0;
      height: 100vh; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ─── 헤더 ─── */
    .header {
      background: var(--accent);
      color: #fff;
      display: flex; align-items: center;
      padding: 6px 12px; gap: 8px;
      flex-shrink: 0;
    }
    .header-title { font-size: 13px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .header-site {
      font-size: 11px; opacity: .85; flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .h-date {
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.4);
      border-radius: 4px; color: #fff;
      font-size: 12px; padding: 3px 8px;
      outline: none; cursor: pointer; flex-shrink: 0;
    }
    .h-date::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .zoom-btn {
      background: rgba(255,255,255,.2); border: none; color: #fff;
      font-size: 11px; font-weight: 600; padding: 3px 8px;
      border-radius: 4px; cursor: pointer; flex-shrink: 0; white-space: nowrap;
    }
    .zoom-btn:hover { background: rgba(255,255,255,.35); }

    /* ─── 요일 버튼 행 ─── */
    .day-row {
      display: flex; gap: 4px; padding: 5px 12px;
      background: var(--accent2); flex-shrink: 0;
    }
    .day-btn {
      flex: 1; padding: 4px 2px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 4px; color: #fff;
      font-size: 11px; font-weight: 600;
      cursor: pointer; text-align: center;
      transition: background .15s; line-height: 1.3;
    }
    .day-btn:hover { background: rgba(255,255,255,.3); }
    .day-btn.today {
      background: #fff; color: var(--accent);
      border-color: #fff; font-weight: 800;
    }
    .day-btn .day-name { display: block; font-size: 12px; }
    .day-btn .day-date { display: block; font-size: 9px; opacity: .8; }
    .day-btn.today .day-date { opacity: 1; color: var(--accent2); }

    /* ─── 이미지 영역 ─── */
    .img-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; overflow-y: auto;
      background: #f0f0f0;
    }
    .img-body {
      cursor: grab;
    }
    .img-body.dragging {
      cursor: grabbing;
    }
    .img-body img {
      width: 100%; height: auto; display: none;
      object-fit: contain;
      transform-origin: center center;
      transition: transform .1s ease;
      user-select: none;
      pointer-events: none; /* 드래그 중 이미지 선택 방지 */
    }
    .img-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #999; font-size: 13px; text-align: center; line-height: 2;
    }
  </style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-title">🖼 이미지 템플릿</div>
  <div class="header-site" id="siteLabel"></div>
  <input type="date" class="h-date" id="dateInput" onchange="loadImage()" />
  <button class="zoom-btn" onclick="zoomScale=Math.max(0.3,zoomScale-0.15);applyZoom()" title="축소 (-)">－</button>
  <button class="zoom-btn" onclick="resetZoom()" title="초기화 (0)">⊙ <span id="zoomLabel">100%</span></button>
  <button class="zoom-btn" onclick="zoomScale=Math.min(5.0,zoomScale+0.15);applyZoom()" title="확대 (+)">＋</button>
  <button class="zoom-btn" id="baseBtn" onclick="goBase()" title="최초 기준일로 돌아가기" style="background:rgba(255,255,255,.35);font-weight:800;">
    ↩ 기준일 <span id="baseDateLabel"></span>
  </button>
  <span style="font-size:10px;opacity:.7;white-space:nowrap;flex-shrink:0;">＋/－·⇧+휠</span>
</div>

<!-- 요일 버튼 -->
<div class="day-row" id="dayRow"></div>

<!-- 이미지 -->
<div class="img-body">
  <div class="img-empty" id="imgEmpty">이미지 로딩 중...</div>
  <img id="theImg" src="" alt="이미지 템플릿"
       onload="this.style.display='block'; document.getElementById('imgEmpty').style.display='none';"
       onerror="document.getElementById('imgEmpty').textContent='이미지를 찾을 수 없습니다.'; this.style.display='none'; document.getElementById('imgEmpty').style.display='flex';" />
</div>

<script>
  // ── URL 파라미터 읽기 ──
  var params   = new URLSearchParams(window.location.search);
  var site     = params.get('site') || '';
  var date     = params.get('date') || '';
  var baseDate = date; // 최초 기준일 고정

  document.getElementById('siteLabel').textContent = site;
  if (date) document.getElementById('dateInput').value = date;

  // 기준일 라벨 표시
  if (baseDate) {
    var bd = new Date(baseDate);
    var mm = String(bd.getMonth()+1).padStart(2,'0');
    var dd = String(bd.getDate()).padStart(2,'0');
    document.getElementById('baseDateLabel').textContent = mm+'/'+dd;
  }

  // 기준일로 복귀
  function goBase() {
    document.getElementById('dateInput').value = baseDate;
    loadImage();
  }

  // ── 날짜 포맷 ──
  function formatDate(d) {
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  // ── 이미지 로드 ──
  function loadImage() {
    var d = document.getElementById('dateInput').value;
    if (!site || !d) return;
    date = d;
    var url = 'https://perception-public-data-us-east-1-prod.s3.us-east-1.amazonaws.com/'+d+'/'+site+'.jpg';
    var img   = document.getElementById('theImg');
    var empty = document.getElementById('imgEmpty');
    img.style.display   = 'none';
    empty.style.display = 'flex';
    empty.textContent   = '이미지 로딩 중...';
    img.src = url;
    resetZoom();
    buildDayButtons(d);
    // 타이틀 업데이트
    document.title = '이미지 템플릿 — ' + site + ' / ' + d;
  }

  // ── 요일 버튼 ──
  function buildDayButtons(currentDate) {
    var container = document.getElementById('dayRow');
    container.innerHTML = '';
    var DAYS    = ['월','화','수','목','금'];
    var dayMap  = [1, 2, 3, 4, 5];
    var cur     = new Date(currentDate);
    var curDay  = cur.getDay();

    dayMap.forEach(function(targetDay, idx) {
      var d    = new Date(cur);
      var diff = targetDay - curDay;
      if (diff === 0) { /* 현재 */ }
      else if (diff > 0) diff -= 7; // 지난주로
      d.setDate(d.getDate() + diff);

      var dateStr = formatDate(d);
      var isToday = (diff === 0);
      var mm = String(d.getMonth()+1).padStart(2,'0');
      var dd = String(d.getDate()).padStart(2,'0');

      var btn = document.createElement('button');
      btn.className = 'day-btn' + (isToday ? ' today' : '');
      btn.innerHTML =
        '<span class="day-name">'+DAYS[idx]+'</span>'+
        '<span class="day-date">'+mm+'/'+dd+'</span>';
      btn.title = dateStr;
      btn.addEventListener('click', function() {
        document.getElementById('dateInput').value = dateStr;
        loadImage();
      });
      container.appendChild(btn);
    });
  }

  // ── 줌 + 드래그 이동 ──
  var zoomScale = 1.0;
  var panX = 0, panY = 0;       // 현재 이동 오프셋
  var ZOOM_MIN = 0.3, ZOOM_MAX = 5.0, ZOOM_STEP = 0.15;

  function applyTransform() {
    var img = document.getElementById('theImg');
    img.style.transform = 'translate('+panX+'px,'+panY+'px) scale('+zoomScale+')';
    document.getElementById('zoomLabel').textContent = Math.round(zoomScale*100)+'%';
  }

  function applyZoom() { applyTransform(); }

  function resetZoom() {
    zoomScale = 1.0; panX = 0; panY = 0;
    applyTransform();
  }

  // Shift + 휠 : 줌
  document.querySelector('.img-body').addEventListener('wheel', function(e) {
    if (!e.shiftKey) return;
    e.preventDefault();
    zoomScale = e.deltaY < 0
      ? Math.min(ZOOM_MAX, zoomScale + ZOOM_STEP)
      : Math.max(ZOOM_MIN, zoomScale - ZOOM_STEP);
    applyTransform();
  }, { passive: false });

  // 클릭+드래그 : 이동 (줌 > 1일 때만 의미있음)
  var isDragging = false;
  var dragStartX = 0, dragStartY = 0;
  var panStartX = 0, panStartY = 0;
  var imgBody = document.querySelector('.img-body');

  imgBody.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return; // 좌클릭만
    isDragging  = true;
    dragStartX  = e.clientX;
    dragStartY  = e.clientY;
    panStartX   = panX;
    panStartY   = panY;
    imgBody.classList.add('dragging');
    e.preventDefault();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    panX = panStartX + (e.clientX - dragStartX);
    panY = panStartY + (e.clientY - dragStartY);
    applyTransform();
  });

  document.addEventListener('mouseup', function() {
    if (!isDragging) return;
    isDragging = false;
    imgBody.classList.remove('dragging');
  });

  // 더블클릭: 위치 초기화
  imgBody.addEventListener('dblclick', function() {
    panX = 0; panY = 0;
    applyTransform();
  });

  // ── 단축키: + / - 확대축소, 0 초기화 ──
  document.addEventListener('keydown', function(e) {
    if (e.key === '+' || e.key === '=' || e.key === 'ㅂ') {
      e.preventDefault();
      zoomScale = Math.min(ZOOM_MAX, zoomScale + ZOOM_STEP);
      applyZoom();
    }
    if (e.key === '-' || e.key === 'ㅡ') {
      e.preventDefault();
      zoomScale = Math.max(ZOOM_MIN, zoomScale - ZOOM_STEP);
      applyZoom();
    }
    if (e.key === '0') {
      e.preventDefault();
      resetZoom();
    }
  });

  // ── 초기 로드 ──
  if (site && date) loadImage();
  else if (site)    document.getElementById('imgEmpty').textContent = '날짜를 선택해 주세요.';
  else              document.getElementById('imgEmpty').textContent = 'URL에 site 파라미터가 없습니다.';
</script>
</body>
</html>
