<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매뉴얼 어노테이션 통합 툴</title>
  <style>
    :root {
      --bg: #f5f5f5; --surface: #ffffff; --border: #e0d8d0;
      --accent: #f97316; --accent2: #ea580c;
      --text: #1a1008; --text-muted: #7a6a58;
      --header-h: 56px; --panel-label: #fff4ed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI','Noto Sans KR',sans-serif; background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; flex-direction:column; }

    /* ─── HEADER ─── */
    header { position:fixed; top:0; left:0; right:0; height:var(--header-h); background:var(--surface); border-bottom:2px solid var(--accent); display:flex; align-items:center; padding:0 16px; gap:12px; z-index:100; box-shadow:0 2px 18px rgba(249,115,22,.25); }
    .header-title { font-size:14px; font-weight:700; color:var(--accent); white-space:nowrap; flex-shrink:0; }
    .header-title span { color:var(--text-muted); font-weight:400; }
    .h-label { font-size:11px; color:var(--text-muted); white-space:nowrap; flex-shrink:0; }
    .h-input { background:#fff; border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:13px; padding:5px 10px; outline:none; transition:border-color .2s; flex-shrink:0; }
    .h-input:focus { border-color:var(--accent); }
    .h-input::placeholder { color:var(--text-muted); }
    #siteInput { width:180px; } #dateInput { width:140px; }
    .h-divider { width:1px; height:28px; background:var(--border); flex-shrink:0; }
    .btn { background:var(--accent); color:#fff; border:none; border-radius:6px; padding:6px 14px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; flex-shrink:0; box-shadow:0 0 10px rgba(249,115,22,.3); transition:opacity .2s; }
    .btn:hover { opacity:.85; }
    .btn-copy { display:flex; align-items:center; gap:5px; background:#fff; color:var(--accent); border:1.5px solid var(--accent); border-radius:6px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; flex-shrink:0; transition:background .15s,color .15s; }
    .btn-copy:hover { background:var(--accent); color:#fff; }
    .btn-copy kbd { font-family:inherit; font-size:10px; font-weight:700; background:var(--accent); color:#fff; border-radius:3px; padding:1px 4px; }
    .btn-copy:hover kbd { background:rgba(255,255,255,.3); }
    .copy-toast { position:fixed; top:64px; left:50%; transform:translateX(-50%) translateY(-6px); background:#1a1008; color:#fff; font-size:12px; font-weight:600; padding:6px 16px; border-radius:20px; opacity:0; pointer-events:none; transition:opacity .2s,transform .2s; z-index:200; white-space:nowrap; }
    .copy-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ─── 이미지 템플릿 사이드 패널 ─── */
    .img-panel {
      position: fixed;
      top: var(--header-h); right: 0; bottom: 0;
      width: 50%;
      background: #111;
      border-left: 3px solid var(--accent);
      display: flex;
      flex-direction: column;
      z-index: 150;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      box-shadow: -8px 0 32px rgba(0,0,0,.3);
    }
    .img-panel.open { transform: translateX(0); }

    .img-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .img-panel-header span { opacity: .85; font-size: 11px; font-weight: 400; }
    .img-panel-close {
      background: rgba(255,255,255,.2);
      border: none; color: #fff;
      font-size: 13px; font-weight: 700;
      padding: 3px 10px; border-radius: 4px;
      cursor: pointer; transition: background .15s;
    }
    .img-panel-close:hover { background: rgba(255,255,255,.4); }

    .img-panel-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #1a1a1a;
    }
    .img-panel-body img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .img-panel-empty {
      color: #555;
      font-size: 13px;
      text-align: center;
      line-height: 2;
    }

    /* 패널 열릴 때 우측 패널 축소 */
    .workspace.panel-open .right-panel {
      margin-right: 50%;
      transition: margin-right .3s cubic-bezier(.4,0,.2,1);
    }
    .workspace .right-panel { transition: margin-right .3s cubic-bezier(.4,0,.2,1); }

    /* ─── WORKSPACE ─── */
    .workspace {
      margin-top: var(--header-h);
      display: flex;
      height: calc(100vh - var(--header-h));
      width: 100%;
    }

    /* 좌측 패널: Debug Tool(flex:2) + 클립보드(flex:1) */
    .left-panel {
      width: 50%;
      display: flex;
      border-right: 2px solid var(--accent);
    }

    /* Debug Tool: 전체 높이 */
    .debug-col {
      flex: 2;
      position: relative;
      border-right: 2px solid var(--accent);
    }

    /* 클립보드 컬럼: 4슬롯 (2x2) */
    .clip-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #fafafa;
      position: relative;
    }

    .clip-col-label {
      position: absolute;
      top: 5px; left: 50%; transform: translateX(-50%);
      font-size: 9px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
      color: var(--accent); background: var(--panel-label);
      border: 1px solid var(--accent); border-radius: 3px; padding: 1px 6px;
      z-index: 20; pointer-events: none; white-space: nowrap;
    }

    /* 슬롯 */
    .clip-slot {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      cursor: pointer;
      transition: background .15s;
      border-bottom: 1px solid var(--border);
    }
    .clip-slot:last-child { border-bottom: none; }
    .clip-slot.is-active { background: #fffaf7; }
    .clip-slot.is-active::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--accent);
    }

    .clip-slot-label {
      position: absolute; top: 3px; left: 8px;
      font-size: 9px; font-weight: 800; letter-spacing: .4px;
      color: var(--text-muted); z-index: 10; pointer-events: none;
      transition: color .15s;
    }
    .clip-slot.is-active .clip-slot-label { color: var(--accent); }

    .clip-drop-area {
      flex: 1;
      margin: 18px 6px 4px;
      border: 1.5px dashed var(--border);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      position: relative;
      overflow: hidden;
      transition: border-color .15s, background .15s;
    }
    .clip-slot.is-active .clip-drop-area { border-color: var(--accent); border-style: solid; }
    .clip-drop-area.has-image { background: #fff8f4; }
    .clip-drop-area.paste-flash { background: #ffe8d6; }

    .clip-hint { display:flex; flex-direction:column; align-items:center; gap:3px; text-align:center; }
    .clip-hint svg { opacity:.2; color:var(--accent); }
    .clip-hint p { font-size:9px; line-height:1.4; opacity:.55; color:var(--text-muted); }
    .clip-hint kbd { font-size:9px; background:var(--accent); color:#fff; border-radius:3px; padding:1px 4px; }
    .clip-img { display:none; max-width:100%; max-height:100%; object-fit:contain; border-radius:3px; }
    .clip-clear-btn {
      position:absolute; top:2px; right:2px;
      background:var(--accent); color:#fff;
      border:none; border-radius:3px;
      font-size:9px; padding:1px 5px;
      cursor:pointer; display:none; z-index:10;
    }
    .clip-clear-btn:hover { opacity:.8; }

    /* 우측 패널 */
    .right-panel { width:50%; position:relative; }

    .panel-label { position:absolute; top:6px; left:8px; font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--accent); background:var(--panel-label); border:1px solid var(--accent); border-radius:4px; padding:2px 7px; z-index:10; pointer-events:none; box-shadow:0 0 6px rgba(249,115,22,.2); }
    iframe { width:100%; height:100%; border:none; display:block; background:#f0f0f0; }
    .placeholder { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:var(--text-muted); font-size:13px; background:#fafafa; z-index:5; }
    .placeholder svg { opacity:.3; color:var(--accent); }
    .placeholder p { opacity:.6; }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div class="header-title">매뉴얼 어노테이션 통합 툴 <span>/ Manual Annotation Integrator</span></div>
  <div class="h-divider"></div>
  <div class="h-label">Site ID</div>
  <input id="siteInput" class="h-input" type="text" placeholder="예: jinhaejoy_1x9" />
  <div class="h-label">날짜</div>
  <input id="dateInput" class="h-input" type="date" />
  <button class="btn" onclick="applyAll()">적용</button>
  <button class="btn-copy" onclick="copySiteID()" title="단축키: X / ㅌ">
    <span id="copyBtnLabel">Site ID 복사하기</span><kbd>[X]</kbd>
  </button>
  <div class="h-divider"></div>
  <button class="btn-copy" id="templateToggleBtn" onclick="toggleTemplatePanel()" title="단축키: Y / ㅛ">
    🖼 이미지 템플릿 <kbd>[Y]</kbd>
  </button>
  <div id="copyToast" class="copy-toast"></div>
</header>

<!-- ═══ WORKSPACE ═══ -->
<div class="workspace">

  <!-- 좌측: Debug Tool + 클립보드 4슬롯 -->
  <div class="left-panel">

    <!-- Debug Tool (전체 높이) -->
    <div class="debug-col">
      <div class="panel-label">🛠 Debug Tool</div>
      <div class="placeholder" id="ph-debug">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
        </svg>
        <p>Site ID와 날짜 입력 후 [적용]</p>
      </div>
      <iframe id="frame-debug" src="about:blank" style="display:none;"></iframe>
    </div>

    <!-- 클립보드 컬럼 (A/B/C/D 4슬롯) -->
    <div class="clip-col">
      <div class="clip-col-label">📋 클립보드</div>

      <!-- 슬롯 A -->
      <div class="clip-slot is-active" id="clipSlotA" onclick="activateSlot('A')">
        <span class="clip-slot-label" id="badgeA">▶ A</span>
        <div class="clip-drop-area" id="clipAreaA">
          <button class="clip-clear-btn" id="clipClearA" onclick="clearClip('A');event.stopPropagation()">✕</button>
          <div class="clip-hint" id="clipHintA">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11v6M9 14l3-3 3 3"/></svg>
            <p>클릭 후<br><kbd>Ctrl+V</kbd></p>
          </div>
          <img class="clip-img" id="clipImgA" alt="A" />
        </div>
      </div>

      <!-- 슬롯 B -->
      <div class="clip-slot" id="clipSlotB" onclick="activateSlot('B')">
        <span class="clip-slot-label" id="badgeB">B</span>
        <div class="clip-drop-area" id="clipAreaB">
          <button class="clip-clear-btn" id="clipClearB" onclick="clearClip('B');event.stopPropagation()">✕</button>
          <div class="clip-hint" id="clipHintB">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11v6M9 14l3-3 3 3"/></svg>
            <p>클릭 후<br><kbd>Ctrl+V</kbd></p>
          </div>
          <img class="clip-img" id="clipImgB" alt="B" />
        </div>
      </div>

      <!-- 슬롯 C -->
      <div class="clip-slot" id="clipSlotC" onclick="activateSlot('C')">
        <span class="clip-slot-label" id="badgeC">C</span>
        <div class="clip-drop-area" id="clipAreaC">
          <button class="clip-clear-btn" id="clipClearC" onclick="clearClip('C');event.stopPropagation()">✕</button>
          <div class="clip-hint" id="clipHintC">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11v6M9 14l3-3 3 3"/></svg>
            <p>클릭 후<br><kbd>Ctrl+V</kbd></p>
          </div>
          <img class="clip-img" id="clipImgC" alt="C" />
        </div>
      </div>

      <!-- 슬롯 D -->
      <div class="clip-slot" id="clipSlotD" onclick="activateSlot('D')">
        <span class="clip-slot-label" id="badgeD">D</span>
        <div class="clip-drop-area" id="clipAreaD">
          <button class="clip-clear-btn" id="clipClearD" onclick="clearClip('D');event.stopPropagation()">✕</button>
          <div class="clip-hint" id="clipHintD">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11v6M9 14l3-3 3 3"/></svg>
            <p>클릭 후<br><kbd>Ctrl+V</kbd></p>
          </div>
          <img class="clip-img" id="clipImgD" alt="D" />
        </div>
      </div>

    </div><!-- /.clip-col -->

  </div><!-- /.left-panel -->

  <!-- 우측: Sync Image Viewer -->
  <div class="right-panel">
    <div class="panel-label">🖼 Sync Image Viewer</div>
    <div class="placeholder" id="ph-img">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>Site ID와 날짜 입력 후 [적용]</p>
    </div>
    <iframe id="frame-img" src="about:blank" style="display:none;"></iframe>
  </div>

</div><!-- /.workspace -->

<!-- ═══ 이미지 템플릿 사이드 패널 ═══ -->
<div class="img-panel" id="imgPanel">
  <div class="img-panel-header">
    <div>🖼 이미지 템플릿 <span id="imgPanelTitle"></span></div>
    <button class="img-panel-close" onclick="toggleTemplatePanel()">✕ 닫기 [Y]</button>
  </div>
  <div class="img-panel-body" id="imgPanelBody">
    <div class="img-panel-empty" id="imgPanelEmpty">
      Site ID와 날짜를 입력 후<br>[적용] 버튼을 누르세요
    </div>
    <img id="imgPanelImg" src="" alt="이미지 템플릿" style="display:none;"
         onload="this.style.display='block'; document.getElementById('imgPanelEmpty').style.display='none';"
         onerror="document.getElementById('imgPanelEmpty').textContent='이미지를 찾을 수 없습니다.'; this.style.display='none';" />
  </div>
</div>

<script>
  // ── 날짜 기본값 ──
  function getLastWorkday() {
    const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-1);
    while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()-1);
    return d;
  }
  function formatDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  document.getElementById('dateInput').value = formatDate(getLastWorkday());

  // ── URL 파라미터 자동 주입 ──
  // 사용 예: ?site=jinhaejoy_1x9&date=2026-03-27
  (function applyUrlParams() {
    const p = new URLSearchParams(window.location.search);
    const site = p.get('site');
    const date = p.get('date');
    if (site) document.getElementById('siteInput').value = site;
    if (date) document.getElementById('dateInput').value = date;
    // 둘 다 있으면 자동으로 적용
    if (site && date) applyAll();
  })();

  // ── 적용 ──
  function applyAll() {
    const site = document.getElementById('siteInput').value.trim();
    const date = document.getElementById('dateInput').value;
    if (!site) { alert('Site ID를 입력해 주세요.'); return; }
    if (!date) { alert('날짜를 입력해 주세요.'); return; }
    document.getElementById('copyBtnLabel').textContent = `${site} 복사하기`;

    // Sync Image Viewer
    const fImg = document.getElementById('frame-img');
    fImg.src = `https://playtag-debugging-tool.vercel.app/sync-images.html?mode=all&date=${date}&site=${encodeURIComponent(site)}`;
    fImg.style.display = 'block';
    document.getElementById('ph-img').style.display = 'none';

    // Debug Tool
    const fDebug = document.getElementById('frame-debug');
    fDebug.src = `https://playtag-debugging-tool.vercel.app/?site=${encodeURIComponent(site)}&date=${date}`;
    fDebug.style.display = 'block';
    document.getElementById('ph-debug').style.display = 'none';
  }

  ['siteInput','dateInput'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') applyAll(); });
  });

  // ── Site ID 복사 ──
  function copySiteID() {
    const site = document.getElementById('siteInput').value.trim();
    if (!site) { alert('먼저 Site ID를 입력하고 [적용]을 눌러주세요.'); return; }
    navigator.clipboard.writeText(site).then(() => {
      const t = document.getElementById('copyToast');
      t.textContent = `✓ "${site}" 복사됨!`; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    });
  }

  // ── 이미지 템플릿 사이드 패널 ──
  let templatePanelOpen = false;

  function toggleTemplatePanel() {
    const panel     = document.getElementById('imgPanel');
    const workspace = document.querySelector('.workspace');
    const btn       = document.getElementById('templateToggleBtn');

    if (templatePanelOpen) {
      // 닫기
      panel.classList.remove('open');
      workspace.classList.remove('panel-open');
      btn.style.background = '';
      btn.style.color = '';
      templatePanelOpen = false;
    } else {
      // 열기: 먼저 이미지 로드
      const site = document.getElementById('siteInput').value.trim();
      const date = document.getElementById('dateInput').value;
      if (!site || !date) { alert('Site ID와 날짜를 먼저 입력해 주세요.'); return; }

      const url = `https://perception-public-data-us-east-1-prod.s3.us-east-1.amazonaws.com/${date}/${site}.jpg`;
      const img   = document.getElementById('imgPanelImg');
      const empty = document.getElementById('imgPanelEmpty');

      img.style.display   = 'none';
      empty.style.display = 'block';
      empty.textContent   = '이미지 로딩 중...';
      img.src = url;

      document.getElementById('imgPanelTitle').textContent = `— ${site} / ${date}`;
      panel.classList.add('open');
      workspace.classList.add('panel-open');
      btn.style.background = 'var(--accent)';
      btn.style.color = '#fff';
      templatePanelOpen = true;
    }
  }

  // applyAll 호출 시 패널이 열려있으면 이미지도 갱신
  const _origApplyAll = applyAll;
  function applyAll() {
    _origApplyAll();
    if (templatePanelOpen) {
      const site = document.getElementById('siteInput').value.trim();
      const date = document.getElementById('dateInput').value;
      if (site && date) {
        const url = `https://perception-public-data-us-east-1-prod.s3.us-east-1.amazonaws.com/${date}/${site}.jpg`;
        const img   = document.getElementById('imgPanelImg');
        const empty = document.getElementById('imgPanelEmpty');
        img.style.display = 'none';
        empty.style.display = 'block';
        empty.textContent = '이미지 로딩 중...';
        img.src = url;
        document.getElementById('imgPanelTitle').textContent = `— ${site} / ${date}`;
      }
    }
  }

  // ── 단축키 ──
  document.addEventListener('keydown', e => {
    if (['siteInput','dateInput'].includes(document.activeElement.id)) return;
    if (e.key==='x'||e.key==='X'||e.key==='ㅌ') copySiteID();
    if (e.key==='y'||e.key==='Y'||e.key==='ㅛ') toggleTemplatePanel();
  });

  // ── 클립보드 A/B/C/D ──
  const SLOTS = ['A','B','C','D'];
  let activeSlot = 'A';

  function activateSlot(slot) {
    activeSlot = slot;
    SLOTS.forEach(s => {
      document.getElementById(`clipSlot${s}`).classList.toggle('is-active', s===slot);
      document.getElementById(`badge${s}`).textContent = s===slot ? `▶ ${s}` : s;
    });
  }

  function clearClip(slot) {
    document.getElementById(`clipImg${slot}`).style.display   = 'none';
    document.getElementById(`clipImg${slot}`).src             = '';
    document.getElementById(`clipHint${slot}`).style.display  = 'flex';
    document.getElementById(`clipClear${slot}`).style.display = 'none';
    document.getElementById(`clipArea${slot}`).classList.remove('has-image');
  }

  document.addEventListener('paste', e => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const url = URL.createObjectURL(item.getAsFile());
        const s   = activeSlot;
        document.getElementById(`clipImg${s}`).src             = url;
        document.getElementById(`clipImg${s}`).style.display   = 'block';
        document.getElementById(`clipHint${s}`).style.display  = 'none';
        document.getElementById(`clipClear${s}`).style.display = 'block';
        const area = document.getElementById(`clipArea${s}`);
        area.classList.add('has-image','paste-flash');
        setTimeout(() => area.classList.remove('paste-flash'), 300);
        break;
      }
    }
  });
</script>
</body>
</html>
