<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매뉴얼 어노테이션 통합 툴</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0d8d0;
      --accent: #f97316;
      --accent2: #ea580c;
      --text: #1a1008;
      --text-muted: #7a6a58;
      --header-h: 56px;
      --panel-label: #fff4ed;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 100;
      box-shadow: 0 2px 18px rgba(249,115,22,.25);
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .header-title span { color: var(--text-muted); font-weight: 400; }

    .h-label {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .h-input {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 5px 10px;
      outline: none;
      transition: border-color .2s;
      flex-shrink: 0;
    }
    .h-input:focus { border-color: var(--accent); }
    .h-input::placeholder { color: var(--text-muted); }
    #siteInput { width: 180px; }
    #dateInput  { width: 140px; }

    .h-divider {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 0 10px rgba(249,115,22,.3);
      transition: opacity .2s, box-shadow .2s;
    }
    .btn:hover { opacity: .85; box-shadow: 0 0 18px rgba(249,115,22,.55); }

    .btn-copy {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #fff;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .15s, color .15s;
    }
    .btn-copy:hover { background: var(--accent); color: #fff; }
    .btn-copy kbd {
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      border-radius: 3px;
      padding: 1px 4px;
    }
    .btn-copy:hover kbd { background: rgba(255,255,255,.3); }

    .copy-toast {
      position: fixed;
      top: 64px;
      left: 50%;
      transform: translateX(-50%) translateY(-6px);
      background: #1a1008;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      z-index: 200;
      white-space: nowrap;
    }
    .copy-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── WORKSPACE ─── */
    .workspace {
      margin-top: var(--header-h);
      display: flex;
      height: calc(100vh - var(--header-h));
      width: 100%;
    }

    .left-panel {
      width: 50%;
      display: flex;
      flex-direction: column;
      border-right: 2px solid var(--accent);
    }

    .left-top {
      height: 50%;
      border-bottom: 2px solid var(--accent);
      display: flex;
    }

    .left-top-debug {
      flex: 2;
      position: relative;
      border-right: 2px solid var(--accent);
    }

    .left-top-clip {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #fafafa;
    }

    /* 클립보드 뷰어 */
    .clip-drop-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      padding: 12px;
      border: 2px dashed var(--border);
      margin: 36px 8px 8px;
      border-radius: 6px;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .clip-drop-area.has-image { border-color: var(--accent); background: #fff8f4; padding: 6px; }
    .clip-drop-area.paste-flash { background: #fff0e6; }
    .clip-img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; display: none; }
    .clip-hint { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .clip-hint svg { opacity: .25; color: var(--accent); }
    .clip-hint p { opacity: .55; font-size: 11px; line-height: 1.6; }
    .clip-hint kbd { font-size: 11px; background: var(--accent); color: #fff; border-radius: 3px; padding: 1px 6px; }
    .clip-clear-btn {
      position: absolute; top: 4px; right: 4px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 4px;
      font-size: 11px; padding: 2px 7px;
      cursor: pointer; display: none; z-index: 10;
    }
    .clip-clear-btn:hover { opacity: .8; }

    .left-bottom { height: 50%; display: flex; }

    .sub-frame {
      flex: 1;
      border-right: 1px solid var(--border);
      position: relative;
    }
    .sub-frame:last-child { border-right: none; }

    .right-panel { width: 50%; position: relative; }

    .panel-label {
      position: absolute;
      top: 6px; left: 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--panel-label);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 2px 7px;
      z-index: 10;
      pointer-events: none;
      box-shadow: 0 0 6px rgba(249,115,22,.2);
    }

    iframe { width: 100%; height: 100%; border: none; display: block; background: #f0f0f0; }

    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      color: var(--text-muted); font-size: 13px;
      background: #fafafa; z-index: 5;
    }
    .placeholder svg { opacity: .3; color: var(--accent); }
    .placeholder p { opacity: .6; }
  </style>
</head>
<body>

<header>
  <div class="header-title">매뉴얼 어노테이션 통합 툴 <span>/ Manual Annotation Integrator</span></div>

  <div class="h-divider"></div>

  <div class="h-label">Site ID</div>
  <input id="siteInput" class="h-input" type="text" placeholder="예: jinhaejoy_1x9" />

  <div class="h-label">날짜</div>
  <input id="dateInput"  class="h-input" type="date" />

  <button class="btn" onclick="applyAll()">적용</button>

  <button class="btn-copy" id="copyBtn" onclick="copySiteID()" title="단축키: X">
    <span id="copyBtnLabel">Site ID 복사하기</span>
    <kbd>[X]</kbd>
  </button>

  <div id="copyToast" class="copy-toast">✓ 복사됨!</div>
</header>

<div class="workspace">

  <div class="left-panel">

    <div class="left-top">

      <div class="left-top-debug">
        <div class="panel-label">🛠 Debug Tool</div>
        <div class="placeholder" id="ph-debug">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          <p>Site ID와 날짜를 입력 후 [적용]을 누르세요</p>
        </div>
        <iframe id="frame-debug" src="about:blank" style="display:none;"></iframe>
      </div>

      <div class="left-top-clip">
        <div class="panel-label">📋 클립보드 뷰어</div>
        <div class="clip-drop-area" id="clipArea">
          <button class="clip-clear-btn" id="clipClearBtn" onclick="clearClip()">✕ 지우기</button>
          <div class="clip-hint" id="clipHint">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="8" y="2" width="8" height="4" rx="1"/>
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <path d="M12 11v6M9 14l3-3 3 3"/>
            </svg>
            <p>이미지를 복사한 뒤<br><kbd>Ctrl+V</kbd> 또는 <kbd>⌘V</kbd><br>로 붙여넣기</p>
          </div>
          <img class="clip-img" id="clipImg" alt="붙여넣은 이미지" />
        </div>
      </div>

    </div>

    <div class="left-bottom">
      <div class="sub-frame">
        <div class="panel-label">⚙ Worker 1</div>
        <iframe id="frame-w1" src="worker.html"></iframe>
      </div>
      <div class="sub-frame">
        <div class="panel-label">⚙ Worker 2</div>
        <iframe id="frame-w2" src="worker.html"></iframe>
      </div>
      <div class="sub-frame">
        <div class="panel-label">⚙ Worker 3</div>
        <iframe id="frame-w3" src="worker.html"></iframe>
      </div>
    </div>

  </div>

  <div class="right-panel">
    <div class="panel-label">🖼 Sync Image Viewer</div>
    <div class="placeholder" id="ph-img">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p>Site ID와 날짜를 입력 후 [적용]을 누르세요</p>
    </div>
    <iframe id="frame-img" src="about:blank" style="display:none;"></iframe>
  </div>

</div>

<script>
  // ── 날짜 기본값: 직전 평일 ──
  function getLastWorkday() {
    const d = new Date();
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() - 1);
    while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
    return d;
  }
  function formatDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // 날짜 input 초기값 세팅
  document.getElementById('dateInput').value = formatDate(getLastWorkday());

  // ── 적용 ──
  function applyAll() {
    const site = document.getElementById('siteInput').value.trim();
    const date = document.getElementById('dateInput').value;

    if (!site) { alert('Site ID를 입력해 주세요.'); return; }
    if (!date) { alert('날짜를 입력해 주세요.'); return; }

    // 복사 버튼 라벨 업데이트
    document.getElementById('copyBtnLabel').textContent = `${site} 복사하기`;

    // 1. Sync Image Viewer (right)
    const fImg = document.getElementById('frame-img');
    fImg.src = `https://playtag-debugging-tool.vercel.app/sync-images.html?mode=all&date=${date}&site=${encodeURIComponent(site)}`;
    fImg.style.display = 'block';
    document.getElementById('ph-img').style.display = 'none';

    // 2. Debug Tool (left-top)
    const fDebug = document.getElementById('frame-debug');
    fDebug.src = `https://playtag-debugging-tool.vercel.app/?site=${encodeURIComponent(site)}&date=${date}`;
    fDebug.style.display = 'block';
    document.getElementById('ph-debug').style.display = 'none';

    // 3. Worker iframe에 URL 파라미터로 전달
    ['w1','w2','w3'].forEach(id => {
      const f = document.getElementById(`frame-${id}`);
      f.src = `worker.html?site=${encodeURIComponent(site)}&date=${date}`;
    });
  }

  // Enter 키
  ['siteInput','dateInput'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') applyAll();
    });
  });

  // ── Site ID 복사 ──
  function copySiteID() {
    const site = document.getElementById('siteInput').value.trim();
    if (!site) { alert('먼저 Site ID를 입력하고 [적용]을 눌러주세요.'); return; }
    navigator.clipboard.writeText(site).then(() => {
      const toast = document.getElementById('copyToast');
      toast.textContent = `✓ "${site}" 복사됨!`;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    });
  }

  // 단축키 X
  document.addEventListener('keydown', e => {
    if (document.activeElement === document.getElementById('siteInput')) return;
    if (document.activeElement === document.getElementById('dateInput'))  return;
    if (e.key === 'x' || e.key === 'X') copySiteID();
  });

  // ── 클립보드 이미지 붙여넣기 ──
  function clearClip() {
    const img  = document.getElementById('clipImg');
    const hint = document.getElementById('clipHint');
    const area = document.getElementById('clipArea');
    const btn  = document.getElementById('clipClearBtn');
    img.style.display = 'none'; img.src = '';
    hint.style.display = 'flex';
    btn.style.display = 'none';
    area.classList.remove('has-image');
  }

  document.addEventListener('paste', e => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const url  = URL.createObjectURL(item.getAsFile());
        const img  = document.getElementById('clipImg');
        const hint = document.getElementById('clipHint');
        const area = document.getElementById('clipArea');
        const btn  = document.getElementById('clipClearBtn');
        img.src = url; img.style.display = 'block';
        hint.style.display = 'none'; btn.style.display = 'block';
        area.classList.add('has-image','paste-flash');
        setTimeout(() => area.classList.remove('paste-flash'), 300);
        break;
      }
    }
  });
</script>
</body>
</html>
