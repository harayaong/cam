<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trajectory Annotation - Worker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #ffffff;
            color: #000000;
            padding: 24px 16px;
            max-width: 560px;
            margin: 0 auto;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 2px solid #000;
            padding-bottom: 8px;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo img {
            max-width: 160px;
            height: auto;
        }

        .form-group { margin-bottom: 16px; }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 13px;
        }

        input[type="text"],
        input[type="date"] {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #000;
            background-color: #fff;
            font-size: 13px;
        }
        input:focus { outline: none; background-color: #f5f5f5; }

        button {
            width: 100%;
            padding: 10px;
            background-color: #000;
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        button:hover { background-color: #333; }

        /* 로딩 오버레이 */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .loading-content {
            background: #fff;
            border: 2px solid #000;
            padding: 18px 22px;
            font-size: 14px;
            max-width: 300px;
            text-align: center;
            line-height: 1.5;
        }
        .loading-timer {
            margin-top: 8px;
            font-size: 12px;
            color: #1e6bb8;
        }

        /* 연결 상태 배지 */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #555;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            flex-shrink: 0;
        }
        .status-dot.ok  { background: #2d6a4f; }
        .status-dot.err { background: #c1121f; }
        .status-dot.ing { background: #f97316; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-content">
        <div id="overlayText">Processing... this may take a few minutes.</div>
        <div id="overlayTimer" class="loading-timer"></div>
    </div>
</div>

<div class="logo">
    <img src="https://harayaong.github.io/cam/storyline_logo.png"
         onerror="this.style.display='none'" alt="Storyline">
</div>

<div class="status-bar">
    <div class="status-dot ing" id="statusDot"></div>
    <span id="statusText">서버 연결 중...</span>
</div>

<h1>Trajectory Annotation Link Generator</h1>

<form id="createLinkForm">
    <input type="hidden" name="form_type" id="form_type" value="link">

    <div class="form-group">
        <label for="site_id">Site ID</label>
        <input type="text" id="site_id" name="site_id" required placeholder="e.g., aisol_1x4">
    </div>

    <div class="form-group">
        <label for="date_id">Date ID</label>
        <input type="date" id="date_id" name="date_id" required>
    </div>

    <div class="form-group">
        <label for="sync_id">Sync ID</label>
        <input type="text" id="sync_id" name="sync_id" required placeholder="e.g., 1">
    </div>

    <div class="form-group">
        <label for="trajectory_id">Trajectory ID</label>
        <input type="text" id="trajectory_id" name="trajectory_id" required placeholder="e.g., 18">
    </div>

    <button type="submit" id="submitBtn">Manual Annotation</button>
</form>

<script>
    const SERVER   = 'http://54.211.199.218:8080';
    const PASSWORD = 'storyline0214$';

    // ── 날짜 기본값: 오늘 기준 직전 평일 ──
    (function setDefaultDate() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
        document.getElementById('date_id').value = d.toISOString().slice(0, 10);
    })();

    // ── URL 파라미터로 siteID/date 자동 주입 (부모 페이지에서 전달) ──
    (function applyParams() {
        const p = new URLSearchParams(window.location.search);
        if (p.get('site')) document.getElementById('site_id').value = p.get('site');
        if (p.get('date')) document.getElementById('date_id').value = p.get('date');
    })();

    // ── Basic Auth 사전 인증 후 상태 표시 ──
    const dot  = document.getElementById('statusDot');
    const stxt = document.getElementById('statusText');

    fetch(SERVER + '/', {
        method: 'GET',
        headers: { 'Authorization': 'Basic ' + btoa(':' + PASSWORD) },
        mode: 'no-cors',
        credentials: 'include'
    })
    .then(() => {
        dot.className  = 'status-dot ok';
        stxt.textContent = '서버 연결됨';
    })
    .catch(() => {
        dot.className  = 'status-dot err';
        stxt.textContent = '서버 연결 실패 — 네트워크를 확인하세요';
    });

    // ── 폼 제출: 실제 서버로 POST ──
    const overlay     = document.getElementById('loadingOverlay');
    const overlayText = document.getElementById('overlayText');
    const overlayTimer = document.getElementById('overlayTimer');
    let timerId = null;

    document.getElementById('createLinkForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const site   = document.getElementById('site_id').value.trim();
        const date   = document.getElementById('date_id').value;
        const syncId = document.getElementById('sync_id').value.trim();
        const trajId = document.getElementById('trajectory_id').value.trim();

        if (!site || !date || !syncId || !trajId) {
            alert('모든 항목을 입력해 주세요.');
            return;
        }

        // 로딩 오버레이 시작
        overlayText.textContent = 'Generating images for manual annotation. This may take up to 10 minutes...';
        overlayTimer.textContent = 'Elapsed: 0s';
        overlay.style.display = 'flex';
        let startAt = Date.now();
        if (timerId) clearInterval(timerId);
        timerId = setInterval(() => {
            const sec = Math.floor((Date.now() - startAt) / 1000);
            const m = Math.floor(sec / 60), s = sec % 60;
            overlayTimer.textContent = m > 0 ? `Elapsed: ${m}m ${s}s` : `Elapsed: ${s}s`;
        }, 1000);

        // Basic Auth 헤더를 포함한 fetch POST → 서버 응답 URL로 이동
        const formData = new FormData();
        formData.append('form_type', 'manual_link');
        formData.append('site_id',   site);
        formData.append('date_id',   date);
        formData.append('sync_id',   syncId);
        formData.append('trajectory_id', trajId);

        fetch(SERVER + '/', {
            method: 'POST',
            headers: { 'Authorization': 'Basic ' + btoa(':' + PASSWORD) },
            body: formData,
            credentials: 'include'
        })
        .then(res => {
            clearInterval(timerId);
            overlay.style.display = 'none';
            // 서버가 리다이렉트 URL을 반환하면 해당 URL로 이동
            if (res.redirected) {
                window.open(res.url, '_blank');
            } else {
                return res.text().then(html => {
                    // 응답 HTML에서 링크 추출 시도
                    const match = html.match(/href=["'](https?:\/\/[^"']+)["']/);
                    if (match) {
                        window.open(match[1], '_blank');
                    } else {
                        // 응답 페이지를 현재 창에 표시
                        document.open();
                        document.write(html);
                        document.close();
                    }
                });
            }
        })
        .catch(err => {
            clearInterval(timerId);
            overlay.style.display = 'none';
            // fetch 실패 시 기존 방식(form 직접 제출)으로 폴백
            const f = document.createElement('form');
            f.method = 'POST';
            f.action = SERVER + '/';
            f.target = '_blank';
            [['form_type','manual_link'],['site_id',site],['date_id',date],
             ['sync_id',syncId],['trajectory_id',trajId]].forEach(([k,v]) => {
                const i = document.createElement('input');
                i.type='hidden'; i.name=k; i.value=v;
                f.appendChild(i);
            });
            document.body.appendChild(f);
            f.submit();
        });
    });
</script>
</body>
</html>
