<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker - Trajectory Annotation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #000;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 상단 폼 영역 (고정 높이, 스크롤) ── */
    .form-area {
      flex-shrink: 0;
      overflow-y: auto;
      padding: 10px 12px 6px;
      border-bottom: 2px solid #f97316;
    }

    .logo { text-align: center; margin-bottom: 8px; }
    .logo img { max-width: 100px; height: auto; }

    h1 { font-size: 13px; font-weight: 700; border-bottom: 2px solid #000; padding-bottom: 5px; margin-bottom: 10px; }

    .status-bar { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 11px; color: #555; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
    .status-dot.ok  { background: #2d6a4f; }
    .status-dot.err { background: #c1121f; }
    .status-dot.ing { background: #f97316; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

    .form-group { margin-bottom: 8px; }
    label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 3px; color: #333; }
    input[type="text"], input[type="date"] {
      width: 100%; padding: 5px 8px;
      border: 1.5px solid #000; font-size: 12px; background: #fff;
    }
    input:focus { outline: none; background: #f5f5f5; }

    /* Sync 버튼 */
    .sync-section { margin-bottom: 8px; }
    .sync-row { display: grid; grid-template-columns: repeat(10, 1fr); gap: 2px; margin-bottom: 2px; }
    .sync-btn {
      padding: 3px 2px; font-size: 9px; font-weight: 600;
      border: 1px solid #ccc; cursor: pointer; text-align: center;
      border-radius: 2px; transition: all .1s; line-height: 1.2;
    }
    .sync-btn.row0 { background: #ffffff; color: #000; border-color: #999; }
    .sync-btn.row1 { background: #e0e0e0; color: #000; border-color: #999; }
    .sync-btn.row2 { background: #c8c8c8; color: #000; border-color: #888; }
    .sync-btn.row3 { background: #b0b0b0; color: #000; border-color: #777; }
    .sync-btn.row4 { background: #989898; color: #fff; border-color: #666; }
    .sync-btn:hover { filter: brightness(.88); }
    .sync-btn.active {
      background: #f97316 !important; color: #fff !important;
      border-color: #ea580c !important;
      box-shadow: 0 0 0 2px rgba(249,115,22,.35);
    }
    .sync-selected { font-size: 10px; color: #f97316; font-weight: 700; margin-top: 3px; min-height: 14px; }

    .submit-btn {
      width: 100%; padding: 8px; background: #000; color: #fff;
      border: none; font-size: 13px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
    }
    .submit-btn:hover { background: #333; }
    .submit-btn:disabled { background: #999; cursor: not-allowed; }

    /* ── 결과 영역 (나머지 공간 차지) ── */
    .result-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #f5f5f5;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: #f97316;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .result-header button {
      background: rgba(255,255,255,.25);
      border: none; color: #fff;
      font-size: 10px; padding: 2px 8px;
      border-radius: 3px; cursor: pointer;
    }
    .result-header button:hover { background: rgba(255,255,255,.4); }

    .result-placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: #aaa;
      font-size: 12px;
    }
    .result-placeholder svg { opacity: .2; }

    #resultFrame {
      flex: 1;
      border: none;
      display: none;
      background: #fff;
    }

    /* 로딩 오버레이 */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: none; align-items: center; justify-content: center; z-index: 2000;
    }
    .loading-content {
      background: #fff; border: 2px solid #000;
      padding: 16px 20px; font-size: 13px;
      max-width: 260px; text-align: center; line-height: 1.5;
    }
    .loading-timer { margin-top: 6px; font-size: 11px; color: #1e6bb8; }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-content">
    <div id="overlayText">Processing...</div>
    <div id="overlayTimer" class="loading-timer"></div>
  </div>
</div>

<!-- ── 폼 영역 ── -->
<div class="form-area">
  <div class="logo">
    <img src="https://harayaong.github.io/cam/storyline_logo.png"
         onerror="this.style.display='none'" alt="Storyline">
  </div>

  <div class="status-bar">
    <div class="status-dot ing" id="statusDot"></div>
    <span id="statusText">서버 연결 중...</span>
  </div>

  <h1>Trajectory Annotation Link Generator</h1>

  <form id="createLinkForm">
    <div class="form-group">
      <label>Site ID</label>
      <input type="text" id="site_id" required placeholder="e.g., aisol_1x4">
    </div>
    <div class="form-group">
      <label>Date ID</label>
      <input type="date" id="date_id" required>
    </div>

    <div class="sync-section">
      <label>Sync ID</label>
      <div class="sync-row" id="syncRow0"></div>
      <div class="sync-row" id="syncRow1"></div>
      <div class="sync-row" id="syncRow2"></div>
      <div class="sync-row" id="syncRow3"></div>
      <div class="sync-row" id="syncRow4"></div>
      <div class="sync-selected" id="syncSelected">선택된 Sync: 없음</div>
    </div>

    <div class="form-group">
      <label>Trajectory ID</label>
      <input type="text" id="trajectory_id" placeholder="e.g., 18">
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">Manual Annotation</button>
  </form>
</div>

<!-- ── 결과 영역 ── -->
<div class="result-area">
  <div class="result-header">
    <span id="resultTitle">📋 결과</span>
    <button onclick="clearResult()">✕ 닫기</button>
  </div>

  <div class="result-placeholder" id="resultPlaceholder">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <p>Manual Annotation 결과가 여기에 표시됩니다</p>
  </div>

  <iframe id="resultFrame"></iframe>
</div>

<script>
  const SERVER   = 'http://54.211.199.218:8080';
  const PASSWORD = 'storyline0214$';

  // ── Sync 버튼 생성 ──
  let selectedSync = null;
  for (let row = 0; row < 5; row++) {
    const container = document.getElementById(`syncRow${row}`);
    for (let col = 0; col < 10; col++) {
      const num   = row * 10 + col;
      const label = `sync${String(num).padStart(2,'0')}`;
      const btn   = document.createElement('button');
      btn.type      = 'button';
      btn.className = `sync-btn row${row}`;
      btn.textContent = num;
      btn.title     = label;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sync-btn.active').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSync = label;
        document.getElementById('syncSelected').textContent = `선택된 Sync: ${label}`;
      });
      container.appendChild(btn);
    }
  }

  // ── URL 파라미터 자동 주입 ──
  (function() {
    const p = new URLSearchParams(window.location.search);
    if (p.get('site')) document.getElementById('site_id').value = p.get('site');
    if (p.get('date')) document.getElementById('date_id').value = p.get('date');
    else {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      while (d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()-1);
      document.getElementById('date_id').value = d.toISOString().slice(0,10);
    }
  })();

  // ── 서버 연결 확인 ──
  const dot  = document.getElementById('statusDot');
  const stxt = document.getElementById('statusText');
  fetch(SERVER + '/', {
    method: 'GET',
    headers: { 'Authorization': 'Basic ' + btoa(':' + PASSWORD) },
    mode: 'no-cors', credentials: 'include'
  })
  .then(() => { dot.className='status-dot ok'; stxt.textContent='서버 연결됨'; })
  .catch(()  => { dot.className='status-dot err'; stxt.textContent='서버 연결 실패'; });

  // ── 결과 표시/초기화 ──
  function showResult(html) {
    const frame = document.getElementById('resultFrame');
    const ph    = document.getElementById('resultPlaceholder');
    // iframe에 HTML 직접 주입
    frame.style.display = 'block';
    ph.style.display    = 'none';
    const doc = frame.contentDocument || frame.contentWindow.document;
    doc.open(); doc.write(html); doc.close();
    document.getElementById('resultTitle').textContent = '📋 결과 — ' + new Date().toLocaleTimeString();
  }

  function clearResult() {
    document.getElementById('resultFrame').style.display = 'none';
    document.getElementById('resultPlaceholder').style.display = 'flex';
    document.getElementById('resultFrame').src = 'about:blank';
    document.getElementById('resultTitle').textContent = '📋 결과';
  }

  // ── 폼 제출 ──
  const overlay      = document.getElementById('loadingOverlay');
  const overlayText  = document.getElementById('overlayText');
  const overlayTimer = document.getElementById('overlayTimer');
  let timerId = null;

  document.getElementById('createLinkForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const site   = document.getElementById('site_id').value.trim();
    const date   = document.getElementById('date_id').value;
    const syncId = selectedSync;
    const trajId = document.getElementById('trajectory_id').value.trim();

    if (!site)   { alert('Site ID를 입력해 주세요.');      return; }
    if (!date)   { alert('날짜를 선택해 주세요.');          return; }
    if (!syncId) { alert('Sync를 선택해 주세요.');          return; }
    if (!trajId) { alert('Trajectory ID를 입력해 주세요.'); return; }

    // 로딩 시작
    overlayText.textContent  = 'Generating images for manual annotation.\nThis may take up to 10 minutes...';
    overlayTimer.textContent = 'Elapsed: 0s';
    overlay.style.display    = 'flex';
    document.getElementById('submitBtn').disabled = true;

    const startAt = Date.now();
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
      const sec = Math.floor((Date.now()-startAt)/1000);
      const m = Math.floor(sec/60), s = sec%60;
      overlayTimer.textContent = m>0 ? `Elapsed: ${m}m ${s}s` : `Elapsed: ${s}s`;
    }, 1000);

    const formData = new FormData();
    formData.append('form_type',     'manual_link');
    formData.append('site_id',       site);
    formData.append('date_id',       date);
    formData.append('sync_id',       syncId);
    formData.append('trajectory_id', trajId);

    fetch(SERVER + '/', {
      method: 'POST',
      headers: { 'Authorization': 'Basic ' + btoa(':' + PASSWORD) },
      body: formData,
      credentials: 'include'
    })
    .then(res => {
      clearInterval(timerId);
      overlay.style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
      return res.text();
    })
    .then(html => {
      // 서버 응답 HTML을 하단 결과 iframe에 표시
      showResult(html);
    })
    .catch(() => {
      clearInterval(timerId);
      overlay.style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
      alert('서버 연결에 실패했습니다.\nworker.html이 서버에 업로드된 후 정상 동작합니다.');
    });
  });
</script>
</body>
</html>
