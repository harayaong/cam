<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker - Trajectory Annotation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #000;
      font-size: 13px;
      padding: 10px 12px;
      overflow-y: auto;
      height: 100vh;
    }

    .logo {
      text-align: center;
      margin-bottom: 10px;
    }
    .logo img { max-width: 120px; height: auto; }

    h1 {
      font-size: 14px;
      font-weight: 700;
      border-bottom: 2px solid #000;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    /* 상태 배지 */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 11px;
      color: #555;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ccc; flex-shrink: 0;
    }
    .status-dot.ok  { background: #2d6a4f; }
    .status-dot.err { background: #c1121f; }
    .status-dot.ing { background: #f97316; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }

    /* 폼 그룹 */
    .form-group { margin-bottom: 10px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }
    input[type="text"], input[type="date"] {
      width: 100%;
      padding: 6px 8px;
      border: 1.5px solid #000;
      font-size: 12px;
      background: #fff;
    }
    input:focus { outline: none; background: #f5f5f5; }

    /* ── Sync 버튼 그리드 ── */
    .sync-section { margin-bottom: 10px; }
    .sync-section label { margin-bottom: 6px; }

    .sync-row {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 3px;
      margin-bottom: 3px;
    }

    .sync-btn {
      padding: 4px 2px;
      font-size: 10px;
      font-weight: 600;
      border: 1.5px solid #ccc;
      cursor: pointer;
      text-align: center;
      border-radius: 2px;
      transition: all .1s;
      line-height: 1.2;
    }
    /* 행별 색상 */
    .sync-btn.row0 { background: #ffffff; color: #000; border-color: #999; }
    .sync-btn.row1 { background: #e0e0e0; color: #000; border-color: #999; }
    .sync-btn.row2 { background: #c8c8c8; color: #000; border-color: #888; }
    .sync-btn.row3 { background: #b0b0b0; color: #000; border-color: #777; }
    .sync-btn.row4 { background: #989898; color: #fff; border-color: #666; }

    .sync-btn:hover { filter: brightness(.88); }
    .sync-btn.active {
      background: #f97316 !important;
      color: #fff !important;
      border-color: #ea580c !important;
      box-shadow: 0 0 0 2px rgba(249,115,22,.35);
    }

    /* 선택된 sync 표시 */
    .sync-selected {
      font-size: 11px;
      color: #f97316;
      font-weight: 700;
      margin-top: 4px;
      min-height: 16px;
    }

    /* Trajectory ID */
    .traj-input {
      width: 100%;
      padding: 6px 8px;
      border: 1.5px solid #000;
      font-size: 12px;
      background: #fff;
    }
    .traj-input:focus { outline: none; background: #f5f5f5; }

    /* 제출 버튼 */
    .submit-btn {
      width: 100%;
      padding: 9px;
      background: #000;
      color: #fff;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    .submit-btn:hover { background: #333; }

    /* 로딩 오버레이 */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }
    .loading-content {
      background: #fff;
      border: 2px solid #000;
      padding: 16px 20px;
      font-size: 13px;
      max-width: 280px;
      text-align: center;
      line-height: 1.5;
    }
    .loading-timer { margin-top: 6px; font-size: 11px; color: #1e6bb8; }
  </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay">
  <div class="loading-content">
    <div id="overlayText">Processing... this may take a few minutes.</div>
    <div id="overlayTimer" class="loading-timer"></div>
  </div>
</div>

<div class="logo">
  <img src="https://harayaong.github.io/cam/storyline_logo.png"
       onerror="this.style.display='none'" alt="Storyline">
</div>

<div class="status-bar">
  <div class="status-dot ing" id="statusDot"></div>
  <span id="statusText">서버 연결 중...</span>
</div>

<h1>Trajectory Annotation Link Generator</h1>

<form id="createLinkForm">

  <div class="form-group">
    <label>Site ID</label>
    <input type="text" id="site_id" required placeholder="e.g., aisol_1x4">
  </div>

  <div class="form-group">
    <label>Date ID</label>
    <input type="date" id="date_id" required>
  </div>

  <!-- ── Sync 버튼 (0~49, 10개씩 5행) ── -->
  <div class="sync-section">
    <label>Sync ID</label>
    <div class="sync-row" id="syncRow0"></div>
    <div class="sync-row" id="syncRow1"></div>
    <div class="sync-row" id="syncRow2"></div>
    <div class="sync-row" id="syncRow3"></div>
    <div class="sync-row" id="syncRow4"></div>
    <div class="sync-selected" id="syncSelected">선택된 Sync: 없음</div>
  </div>

  <div class="form-group">
    <label>Trajectory ID</label>
    <input type="text" id="trajectory_id" required placeholder="e.g., 18">
  </div>

  <button type="submit" class="submit-btn">Manual Annotation</button>

</form>

<script>
  const SERVER   = 'http://54.211.199.218:8080';
  const PASSWORD = 'storyline0214$';

  // ── Sync 버튼 생성 ──
  let selectedSync = null;

  for (let row = 0; row < 5; row++) {
    const container = document.getElementById(`syncRow${row}`);
    for (let col = 0; col < 10; col++) {
      const num = row * 10 + col;
      const label = `sync${String(num).padStart(2,'0')}` ; // sync00~sync49
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = `sync-btn row${row}`;
      btn.textContent = num;                   // 버튼엔 숫자만
      btn.dataset.sync = label;
      btn.title = label;
      btn.addEventListener('click', () => {
        // 이전 선택 해제
        document.querySelectorAll('.sync-btn.active').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedSync = label;
        document.getElementById('syncSelected').textContent = `선택된 Sync: ${label}`;
      });
      container.appendChild(btn);
    }
  }

  // ── URL 파라미터로 site / date 자동 주입 ──
  (function applyParams() {
    const p = new URLSearchParams(window.location.search);
    if (p.get('site')) document.getElementById('site_id').value = p.get('site');
    if (p.get('date')) document.getElementById('date_id').value = p.get('date');
    else {
      // 기본값: 직전 평일
      const d = new Date();
      d.setDate(d.getDate() - 1);
      while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
      document.getElementById('date_id').value = d.toISOString().slice(0,10);
    }
  })();

  // ── Basic Auth 사전 연결 확인 ──
  const dot  = document.getElementById('statusDot');
  const stxt = document.getElementById('statusText');
  fetch(SERVER + '/', {
    method: 'GET',
    headers: { 'Authorization': 'Basic ' + btoa(':' + PASSWORD) },
    mode: 'no-cors',
    credentials: 'include'
  })
  .then(() => { dot.className = 'status-dot ok'; stxt.textContent = '서버 연결됨'; })
  .catch(() => { dot.className = 'status-dot err'; stxt.textContent = '서버 연결 실패'; });

  // ── 폼 제출 ──
  const overlay      = document.getElementById('loadingOverlay');
  const overlayText  = document.getElementById('overlayText');
  const overlayTimer = document.getElementById('overlayTimer');
  let timerId = null;

  document.getElementById('createLinkForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const site   = document.getElementById('site_id').value.trim();
    const date   = document.getElementById('date_id').value;
    const syncId = selectedSync;
    const trajId = document.getElementById('trajectory_id').value.trim();

    if (!site)   { alert('Site ID를 입력해 주세요.');     return; }
    if (!date)   { alert('날짜를 선택해 주세요.');         return; }
    if (!syncId) { alert('Sync를 선택해 주세요.');         return; }
    if (!trajId) { alert('Trajectory ID를 입력해 주세요.'); return; }

    // 로딩 시작
    overlayText.textContent = 'Generating images for manual annotation. This may take up to 10 minutes...';
    overlayTimer.textContent = 'Elapsed: 0s';
    overlay.style.display = 'flex';
    const startAt = Date.now();
    if (timerId) clearInterval(timerId);
    timerId = setInterval(() => {
      const sec = Math.floor((Date.now() - startAt) / 1000);
      const m = Math.floor(sec/60), s = sec%60;
      overlayTimer.textContent = m > 0 ? `Elapsed: ${m}m ${s}s` : `Elapsed: ${s}s`;
    }, 1000);

    // fetch POST
    const formData = new FormData();
    formData.append('form_type',      'manual_link');
    formData.append('site_id',        site);
    formData.append('date_id',        date);
    formData.append('sync_id',        syncId);
    formData.append('trajectory_id',  trajId);

    fetch(SERVER + '/', {
      method: 'POST',
      headers: { 'Authorization': 'Basic ' + btoa(':' + PASSWORD) },
      body: formData,
      credentials: 'include'
    })
    .then(res => {
      clearInterval(timerId);
      overlay.style.display = 'none';
      if (res.redirected) {
        window.open(res.url, '_blank');
      } else {
        return res.text().then(html => {
          const match = html.match(/href=["'](https?:\/\/[^"']+)["']/);
          if (match) window.open(match[1], '_blank');
          else { document.open(); document.write(html); document.close(); }
        });
      }
    })
    .catch(() => {
      clearInterval(timerId);
      overlay.style.display = 'none';
      // 폴백: form 직접 제출
      const f = document.createElement('form');
      f.method = 'POST'; f.action = SERVER + '/'; f.target = '_blank';
      [['form_type','manual_link'],['site_id',site],['date_id',date],
       ['sync_id',syncId],['trajectory_id',trajId]].forEach(([k,v]) => {
        const i = document.createElement('input');
        i.type='hidden'; i.name=k; i.value=v; f.appendChild(i);
      });
      document.body.appendChild(f); f.submit();
    });
  });
</script>
</body>
</html>
