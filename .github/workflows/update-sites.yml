name: Update sites.html from OMS

on:
  schedule:
    # 07:10 KST every day. GitHub cron uses UTC.
    - cron: "10 22 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "OMS data date in YYYY-MM-DD. Empty means today in Asia/Seoul."
        required: false
        type: string

permissions:
  contents: write

jobs:
  update-sites:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate sites.html
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/generate-sites-html.js --date "${{ github.event.inputs.date }}" --output sites.html
          else
            node scripts/generate-sites-html.js --output sites.html
          fi

      - name: Commit changes
        run: |
          if git diff --quiet -- sites.html; then
            echo "sites.html is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sites.html
          git commit -m "Update sites.html from OMS"
          git push
