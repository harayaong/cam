<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>리뷰테스크</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --surface: #ffffff;
      --border: #e8ecf0;
      --text: #1c2333;
      --text-muted: #8492a6;
      --accent: #00c8b4;
      --accent-dark: #00a896;
      --panel-w: 50vw;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; min-height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      font-size: 14px; line-height: 1.5;
    }

    body { overflow-y: auto; }

    .topbar {
      position: sticky; top: 0; z-index: 20;
      height: 48px; padding: 0 14px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      background: rgba(255,255,255,0.94); border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-sm); backdrop-filter: blur(8px);
    }

    .title {
      display: flex; align-items: center; gap: 8px;
      font-weight: 700; white-space: nowrap;
    }
    .title::before {
      content: ""; width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 0 3px #e0faf7;
    }

    .meta {
      color: var(--text-muted); font-size: 12px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .hint {
      color: var(--accent-dark); font-size: 12px; white-space: nowrap;
      opacity: 0; transition: opacity 0.18s;
    }
    .hint.show { opacity: 1; }

    .spacer { flex: 1; min-width: 12px; }

    .btn {
      height: 32px; padding: 0 11px;
      border: 1.5px solid var(--border); border-radius: 6px;
      background: var(--surface); color: var(--text);
      font: inherit; font-size: 12.5px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .btn:hover { border-color: #c8d0dc; background: #f0f4f8; }
    .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-accent:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

    .kbd {
      display: inline-block; margin-left: 3px; padding: 0 5px;
      border: 1px solid #d0d8e4; border-bottom-width: 2px;
      border-radius: 4px; background: #fff; color: var(--text);
      font: 11px ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .image-wrap {
      position: relative;
      width: 100%;
      min-height: calc(100vh - 48px);
      background: #f3f4f6;
    }

    #templateImage {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    .status {
      position: fixed; top: 60px; left: 50%; z-index: 30;
      transform: translateX(-50%);
      padding: 8px 12px; color: var(--text-muted); text-align: center;
      background: rgba(255,255,255,0.96); border: 1px solid var(--border);
      border-radius: 999px; box-shadow: var(--shadow-sm);
      white-space: nowrap;
    }
    .status.error {
      color: #b42318; border-color: #f3b8b0; border-radius: 8px;
    }

    @media (max-width: 900px) {
      :root { --panel-w: 86vw; }
      .meta { flex-basis: 100%; }
      .topbar { height: auto; min-height: 48px; padding: 8px 12px; }
      .image-wrap { min-height: calc(100vh - 64px); }
      .status { top: 76px; max-width: calc(100vw - 24px); white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">리뷰테스크</div>
    <div class="meta" id="pageMeta">—</div>
    <div class="hint" id="trainsetHint">트레인셋 탭을 다시 포커스했습니다.</div>
    <div class="spacer"></div>
    <button class="btn btn-accent" onclick="openTrainset()">트레인셋 열기/포커스 <span class="kbd">T</span></button>
  </div>

  <main class="image-wrap" id="imageWrap">
    <div class="status" id="status">이미지템플릿을 불러오는 중...</div>
    <img id="templateImage" alt="이미지템플릿" style="display:none;">
  </main>

  <script>
    const $ = id => document.getElementById(id);

    const params = new URLSearchParams(location.search);
    const site = (params.get("site") || "samsung_830").trim();
    const date = (params.get("date") || new Date().toISOString().slice(0, 10)).trim();
    let imageUrl = "";
    let trainsetWin = null;
    let hintTimer = null;

    function trainsetUrl() {
      return `https://trainset-management-tool.vercel.app/service/trainingset?fullscreen=true&siteid=${encodeURIComponent(site)}`;
    }

    function showTrainsetHint(text) {
      clearTimeout(hintTimer);
      const el = $("trainsetHint");
      el.textContent = text;
      el.classList.add("show");
      hintTimer = setTimeout(() => el.classList.remove("show"), 1800);
    }

    function imageTemplateOpenUrl() {
      return `/api/image-template-open?date=${encodeURIComponent(date)}&site=${encodeURIComponent(site)}`;
    }

    function loadImage() {
      $("pageMeta").textContent = `${date} / ${site}`;
      const img = $("templateImage");
      imageUrl = imageTemplateOpenUrl();
      img.style.display = "block";
      img.decoding = "async";
      img.fetchPriority = "high";
      img.onload = () => {
        $("status").style.display = "none";
      };
      img.onerror = () => {
        $("status").classList.add("error");
        $("status").style.display = "block";
        $("status").textContent = "이미지템플릿을 표시하지 못했습니다.";
        img.style.display = "none";
      };
      img.src = imageUrl;
    }

    function openTrainset() {
      if (trainsetWin && !trainsetWin.closed) {
        trainsetWin.focus();
        showTrainsetHint("트레인셋 탭을 다시 포커스했습니다.");
        return;
      }
      trainsetWin = window.open(trainsetUrl(), "reviewtask_trainset");
      if (!trainsetWin) {
        alert("팝업이 차단되었습니다. 브라우저에서 팝업 허용 후 다시 시도해주세요.");
      } else {
        showTrainsetHint("트레인셋 탭을 열었습니다. 작업 중에는 탭을 닫지 않고 재사용하세요.");
      }
    }

    document.addEventListener("keydown", e => {
      const tag = document.activeElement?.tagName?.toLowerCase();
      if (["input", "textarea", "select"].includes(tag)) return;
      if (["t", "T", "ㅅ"].includes(e.key)) {
        e.preventDefault();
        openTrainset();
      }
    }, true);

    loadImage();
  </script>
</body>
</html>
